      --muted: #7A7A7A;
      --bg: #F5F5F5;

      background: var(--bg);

    }

    /* ===== HEADER ===== */

      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--red);
      color: #fff;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }
    .header-back {
      width: 36px; height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      color: #fff;
      text-decoration: none;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .header-back svg {
      width: 20px; height: 20px;
    }
    .header-title {
      font-size: 1.05rem;
      font-weight: 600;
      flex: 1;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-right {
      width: 36px;
      flex-shrink: 0;
    }

    /* ===== SEARCH ===== */
    .search-bar {
      position: fixed;
      top: 52px; left: 0; right: 0;
      z-index: 999;
      background: #fff;
      padding: 0.6rem 1rem;
      display: flex;
      gap: 0.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .search-input-wrap {
      flex: 1;
      position: relative;
    }
    .search-input-wrap svg {
      position: absolute;
      left: 0.7rem;
      top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--muted);
    }
    .search-input {
      width: 100%;
      padding: 0.55rem 0.7rem 0.55rem 2.2rem;
      border: 1px solid #E8E3DB;
      border-radius: 100px;
      font-size: 0.9rem;
      outline: none;
      background: #FAFAFA;
      transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .locate-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      padding: 0.55rem 0.9rem;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
    }
    .locate-btn:active { opacity: 0.85; }
    .locate-btn svg { width: 16px; height: 16px; }

    /* ===== MAP ===== */
    #map {
      position: fixed;
      top: 110px; left: 0; right: 0;
      height: calc(100vh - 110px - 180px);
      z-index: 1;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      width: 240px !important;
    }
    .popup-card {
      padding: 0.75rem;
    }
    .popup-card h4 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--red);
      margin-bottom: 0.3rem;
    }
    .popup-card p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 0.15rem;
    }
    .popup-card .time {
      font-size: 0.72rem;
      color: var(--gold);
      font-weight: 600;
    }

    /* ===== STORE LIST ===== */
    .store-list {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 180px;
      background: #fff;
      border-radius: 16px 16px 0 0;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
      z-index: 998;
      display: flex;
      flex-direction: column;
    }
    .store-list-header {
      padding: 0.6rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #F0F0F0;
    }
    .store-list-header h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
    }
    .store-list-header span {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .store-list-scroll {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .store-list-scroll::-webkit-scrollbar { height: 3px; }
    .store-list-scroll::-webkit-scrollbar-thumb {
      background: var(--red);
      border-radius: 2px;
    }
    .store-card {
      flex-shrink: 0;
      width: 220px;
      background: #FAFAFA;
      border-radius: 12px;
      padding: 0.75rem;
      border: 1px solid #F0F0F0;
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;

    .store-card:active { transform: scale(0.97); }
    .store-card.active {
      border-color: var(--gold);
      background: #FFFDF5;
    }
    .store-card h4 {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

      color: var(--red);
      font-weight: 600;
      margin-bottom: 0.2rem;

    .store-card p {

      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;

    .store-card .distance {
      font-size: 0.72rem;
      color: var(--gold);
      font-weight: 600;
      margin-top: 0.3rem;
    }

      display: none;
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 100;

    .no-result p {

      top: 120px; left: 50%;

      color: #fff;
      padding: 0.6rem 1.2rem;

      font-size: 0.85rem;
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .toast.show {

      { name: "石家庄店", city: "石家庄", address: "河北省石家庄市裕华区", lat: 38.035, lng: 114.515, time: "9:00 - 22:00" },
      { name: "台州店", city: "台州", address: "浙江省台州市椒江区", lat: 28.655, lng: 121.425, time: "9:00 - 22:00" },
      { name: "佛山店", city: "佛山", address: "广东省佛山市南海区", lat: 23.045, lng: 113.135, time: "9:00 - 22:00" },
      { name: "中山店", city: "中山", address: "广东省中山市东区", lat: 22.525, lng: 113.385, time: "9:00 - 22:00" },
      { name: "扬州店", city: "扬州", address: "江苏省扬州市邗江区", lat: 32.395, lng: 119.415, time: "9:00 - 22:00" },
      { name: "张家港店", city: "苏州", address: "江苏省张家港市", lat: 31.885, lng: 120.555, time: "9:00 - 22:00" },
      { name: "北京昌平店", city: "北京", address: "北京市昌平区", lat: 40.185, lng: 116.235, time: "8:00 - 22:00" },
      { name: "深圳宝安店", city: "深圳", address: "广东省深圳市宝安区", lat: 22.575, lng: 113.885, time: "9:00 - 22:00" },
      { name: "上海松江店", city: "上海", address: "上海市松江区", lat: 31.035, lng: 121.225, time: "8:00 - 22:00" },
      { name: "武汉江岸店", city: "武汉", address: "湖北省武汉市江岸区", lat: 30.595, lng: 114.305, time: "9:00 - 22:00" },
      { name: "温州店", city: "温州", address: "浙江省温州市鹿城区", lat: 28.015, lng: 120.655, time: "9:00 - 22:00" },
      { name: "泉州晋江店", city: "泉州", address: "福建省泉州市晋江市", lat: 24.785, lng: 118.555, time: "9:00 - 22:00" },
      { name: "昆明店", city: "昆明", address: "云南省昆明市官渡区", lat: 25.045, lng: 102.705, time: "9:00 - 22:00" },
      { name: "西安店", city: "西安", address: "陕西省西安市雁塔区", lat: 34.265, lng: 108.945, time: "9:00 - 22:00" },
      { name: "郑州店", city: "郑州", address: "河南省郑州市金水区", lat: 34.745, lng: 113.625, time: "9:00 - 22:00" },
      { name: "贵阳店", city: "贵阳", address: "贵州省贵阳市观山湖区", lat: 26.585, lng: 106.715, time: "9:00 - 22:00" },
    ];

    // ===== MAP INIT =====
    const map = L.map('map', { zoomControl: false }).setView([31.2304, 121.4737], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap',
      maxZoom: 18,
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    // ===== MARKERS =====
    const markers = [];
    let userMarker = null;

    function createCustomIcon(color) {
      return L.divIcon({
        className: 'custom-marker',
        html: `<svg width="28" height="36" viewBox="0 0 28 36" fill="none"><path d="M14 0C6.268 0 0 6.268 0 14c0 10.5 14 22 14 22s14-11.5 14-22c0-7.732-6.268-14-14-14z" fill="${color}"/><circle cx="14" cy="14" r="5" fill="white"/></svg>`,
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -36],
      });
    }

    function addStoreMarkers(storeList) {
      markers.forEach(m => map.removeLayer(m));
      markers.length = 0;
      storeList.forEach(s => {
        const marker = L.marker([s.lat, s.lng], { icon: createCustomIcon('#9B1B30') })
          .addTo(map)
          .bindPopup(`<div class="popup-card"><h4>${s.city} · ${s.name}</h4><p>${s.address}</p><p class="time">营业时间：${s.time}</p></div>`);
        marker.storeData = s;
        markers.push(marker);
      });
    }

    // ===== LIST RENDER =====
    function renderList(storeList, userLat, userLng) {
      const listEl = document.getElementById('storeList');
      const countEl = document.getElementById('storeCount');
      const noResult = document.getElementById('noResult');
      listEl.innerHTML = '';
      countEl.textContent = `共 ${storeList.length} 家`;

      if (storeList.length === 0) {
        noResult.classList.add('show');
        return;
      }
      noResult.classList.remove('show');

      storeList.forEach((s, i) => {
        let distText = '';
        if (userLat != null && userLng != null) {
          const d = getDistance(userLat, userLng, s.lat, s.lng);
          distText = d < 1 ? `${(d * 1000).toFixed(0)}m` : `${d.toFixed(1)}km`;
        }
        const card = document.createElement('div');
        card.className = 'store-card';
        card.innerHTML = `<div class="city">${s.city}</div><h4>${s.name}</h4><p>${s.address}</p>${distText ? `<div class="distance">距您约 ${distText}</div>` : ''}`;
        card.addEventListener('click', () => {
          map.setView([s.lat, s.lng], 14);
          markers.forEach(m => { if (m.storeData === s) m.openPopup(); });
          document.querySelectorAll('.store-card').forEach(c => c.classList.remove('active'));
          card.classList.add('active');
        });
        listEl.appendChild(card);
      });
    }

    // ===== DISTANCE =====
    function getDistance(lat1, lng1, lat2, lng2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    // ===== SEARCH =====
    document.getElementById('searchInput').addEventListener('input', e => {
      const kw = e.target.value.trim().toLowerCase();
      if (!kw) {
        addStoreMarkers(stores);
        renderList(stores);
        map.setView([31.2304, 121.4737], 5);
        return;
      }
      const filtered = stores.filter(s =>
        s.name.toLowerCase().includes(kw) ||
        s.city.toLowerCase().includes(kw) ||
        s.address.toLowerCase().includes(kw)
      );
      addStoreMarkers(filtered);
      renderList(filtered);
      if (filtered.length > 0) {
        const group = new L.featureGroup(markers);
        map.fitBounds(group.getBounds().pad(0.2));
      }
    });

    // ===== LOCATE =====
    document.getElementById('locateBtn').addEventListener('click', () => {
      showToast('正在定位...');
      if (!navigator.geolocation) {
        showToast('您的设备不支持定位');
        return;
      }
      navigator.geolocation.getCurrentPosition(pos => {
        const uLat = pos.coords.latitude;
        const uLng = pos.coords.longitude;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([uLat, uLng], { icon: createCustomIcon('#C9A96E') })
          .addTo(map)
          .bindPopup('<div class="popup-card"><h4>我的位置</h4></div>')
          .openPopup();

        const sorted = [...stores].map(s => ({
          ...s,
          dist: getDistance(uLat, uLng, s.lat, s.lng)
        })).sort((a, b) => a.dist - b.dist);

        addStoreMarkers(sorted);
        renderList(sorted, uLat, uLng);
        map.setView([uLat, uLng], 10);
        showToast(`最近门店：${sorted[0].city}${sorted[0].name}，距您约${sorted[0].dist < 1 ? (sorted[0].dist * 1000).toFixed(0) + 'm' : sorted[0].dist.toFixed(1) + 'km'}`);
      }, () => {
        showToast('定位失败，请检查定位权限');
      }, { enableHighAccuracy: true, timeout: 10000 });
    });

    // ===== TOAST =====
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ===== INIT =====
    addStoreMarkers(stores);
    renderList(stores);
  </script>
</body>
</html>
